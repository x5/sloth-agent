<h2>选择视觉风格方向</h2>
<p class="subtitle">点击选择你最倾向的设计风格</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Warm Editorial (保持当前方向并提升)</h3>
      <p>保留暖色调 paper/ink 体系，增强 SVG 流程图、图标系统化、排版层级更分明。类似高端杂志排版，温度感强。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Dark Tech (暗色科技风)</h3>
      <p>深色背景 + 高对比度荧光色，代码编辑器质感。适合强调"工程系统"定位，视觉冲击力更强。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Clean Corporate (干净企业风)</h3>
      <p>白色/浅灰底 + 品牌蓝/绿，大量留白，类似 Stripe/Vercel 产品发布页。更正式、更商务。</p>
    </div>
  </div>
</div>
